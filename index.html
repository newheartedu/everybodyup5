            }
        }

        function startCarRacingGame() {
            window.isMinigameActive = true;
            currentRacingLevel = 1 + Math.floor(taxiTotalScore / 50);

            const targetArea = window.currentGameContentArea || gameArea;

            let instText = "閃避路障 🚧，載客 🙋 賺分數！";
            if (currentRacingLevel >= 2) instText += "<br/>速度加快！出現時間寶物 ⏱️！";
            if (currentRacingLevel >= 3) instText += "<br/>超極速！無敵星星 🌟 可撞飛路障！";

            targetArea.innerHTML = `
                <div class="w-full flex flex-col items-center animate-fadeIn">
                    <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-700 to-orange-500 mb-2">🚕 瘋狂計程車！</h2>
                    <p class="text-red-800 font-semibold mb-4 bg-red-100 px-4 py-1 rounded-xl text-center leading-relaxed text-sm">${instText}</p>
                    
                    <div id="racing-canvas-container" class="relative bg-gray-800 rounded-xl overflow-hidden shadow-2xl border-4 border-gray-700 cursor-pointer" style="width: 100%; max-width: 320px; height: 450px; touch-action: none;">
                        <canvas id="racing-canvas" width="320" height="450" class="w-full h-full block relative z-10"></canvas>
                        
                        <!-- 返回答題按鈕 -->
                        <button id="btn-back-quiz-taxi" class="absolute top-2 right-2 px-3 py-1 bg-white/20 hover:bg-white/40 text-white text-sm rounded-full z-40 font-bold backdrop-blur-sm border border-white/50 transition-colors shadow-lg">
                            🔙 返回答題
                        </button>

                        <!-- UI 介面 -->
                        <div class="absolute top-2 left-2 flex flex-col pointer-events-none z-30 drop-shadow-md">
                            <span class="text-white font-extrabold text-lg">⛽ <span id="racing-time" class="text-red-400">${gameFuel}</span>s</span>
                            <span class="text-yellow-400 font-extrabold text-lg">🙋 <span id="racing-score">${taxiTotalScore}</span></span>
                            <span class="text-red-400 font-extrabold text-lg">🎖️ Lv.<span id="racing-level-display">${currentRacingLevel}</span></span>
                        </div>

                        <!-- 狀態提示 -->
                        <div id="time-bonus-text" class="absolute top-1/3 left-0 w-full text-center text-green-400 font-extrabold text-3xl opacity-0 transition-opacity duration-300 z-20 drop-shadow-lg pointer-events-none" style="text-shadow: 0px 4px 10px rgba(0,0,0,0.8);">+3s</div>

                        <!-- 結算畫面 -->
                        <div id="racing-overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-white hidden z-50 backdrop-blur-sm p-4 text-center">
                            <h3 class="text-3xl font-extrabold mb-2 text-red-400">⛽ 油量耗盡！</h3>
                            <p class="text-xl mb-4">目前累積計程車分數: <span id="racing-final-score" class="text-yellow-400 font-bold mx-1">0</span></p>
                            <p class="text-md text-white/80 font-bold mb-6">快返回答題賺取更多油量！</p>
                            <button id="racing-continue-btn" class="px-8 py-3 bg-gradient-to-r from-red-500 to-rose-500 rounded-full text-white font-bold text-lg hover:shadow-lg hover:scale-105 transition-transform shadow-lg border border-white/30">🔙 去答題賺油量</button>
                        </div>
                        
                        <!-- 開始提示 -->
                        <div id="racing-start-hint" class="absolute inset-0 flex items-center justify-center pointer-events-none z-20 transition-opacity duration-500">
                             <p class="text-xl text-white font-bold bg-black/50 px-6 py-2 rounded-full">左右滑動開始</p>
                        </div>
                    </div>
                    <p class="mt-4 text-sm font-medium text-gray-500 bg-white/60 px-3 py-1 rounded-md">💻 電腦：左右方向鍵 / 📱 手機：按住左右滑動</p>
                </div>
            `;

            const canvas = document.getElementById('racing-canvas');
            const ctx = canvas.getContext('2d');
            const startHint = document.getElementById('racing-start-hint');
            const timeBonusText = document.getElementById('time-bonus-text');
            
            let isPlaying = true;
            let lastTime = Date.now();
            let timerLastTime = Date.now();

            let speedMultiplier = 1 + (currentRacingLevel - 1) * 0.15; 
            let obstacleRate = Math.min(0.7, 0.4 + (currentRacingLevel - 1) * 0.05); 

            let car = { x: 140, y: 350, width: 40, height: 60, speed: 250 * speedMultiplier };
            let entities = [];
            let invincible = false;
            let invincibleTimer = 0;

            let leftPressed = false;
            let rightPressed = false;

            const handleKeyDown = (e) => {
                if(e.key === 'ArrowLeft') { leftPressed = true; startHint.style.opacity = '0'; }
                if(e.key === 'ArrowRight') { rightPressed = true; startHint.style.opacity = '0'; }
            };
            const handleKeyUp = (e) => {
                if(e.key === 'ArrowLeft') leftPressed = false;
                if(e.key === 'ArrowRight') rightPressed = false;
            };

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);

            const container = document.getElementById('racing-canvas-container');
            let isDragging = false;
            
            const updateCarPos = (clientX) => {
                startHint.style.opacity = '0';
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const x = (clientX - rect.left) * scaleX;
                car.x = x - car.width / 2;
                if (car.x < 0) car.x = 0;
                if (car.x + car.width > canvas.width) car.x = canvas.width - car.width;
            };

            const handleMouseDown = (e) => { isDragging = true; updateCarPos(e.clientX); };
            const handleMouseMove = (e) => { if(isDragging) updateCarPos(e.clientX); };
            const handleMouseUp = () => { isDragging = false; };
            
            const handleTouchStart = (e) => { isDragging = true; updateCarPos(e.touches[0].clientX); };
            const handleTouchMove = (e) => { if(isDragging) { e.preventDefault(); updateCarPos(e.touches[0].clientX); } };
            const handleTouchEnd = () => { isDragging = false; };

            container.addEventListener('mousedown', handleMouseDown);
            container.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            container.addEventListener('touchstart', handleTouchStart, {passive: false});
            container.addEventListener('touchmove', handleTouchMove, {passive: false});
            window.addEventListener('touchend', handleTouchEnd);

            document.getElementById('btn-back-quiz-taxi').onclick = (e) => {
                e.stopPropagation();
                endGame(false);
            };

            let spawnTimeout;
            let animationId;

            function cleanup() {
                isPlaying = false;
                window.isMinigameActive = false;
                clearTimeout(spawnTimeout);
                cancelAnimationFrame(animationId);
                
                window.removeEventListener('keydown', handleKeyDown);
                window.removeEventListener('keyup', handleKeyUp);
                if (container) {
                    container.removeEventListener('mousedown', handleMouseDown);
                    container.removeEventListener('mousemove', handleMouseMove);
                    container.removeEventListener('touchstart', handleTouchStart);
                    container.removeEventListener('touchmove', handleTouchMove);
                }
                window.removeEventListener('mouseup', handleMouseUp);
                window.removeEventListener('touchend', handleTouchEnd);
            }
            window.cleanupCurrentGame = cleanup;

            function spawnEntity() {
                if(!isPlaying || !document.getElementById('racing-canvas')) return;
                
                const rand = Math.random();
                let type = 'passenger';
                let eSpeed = 200 * speedMultiplier;
                
                let timeProb = currentRacingLevel >= 2 ? 0.08 : 0;
                let starProb = currentRacingLevel >= 3 ? 0.05 : 0;
                
                if (rand < starProb) {
                    type = 'star';
                    eSpeed = 250 * speedMultiplier;
                } else if (rand < starProb + timeProb) {
                    type = 'time';
                    eSpeed = 250 * speedMultiplier;
                } else if (rand < starProb + timeProb + obstacleRate) {
                    type = 'obstacle';
                    eSpeed = (250 + Math.random() * 100) * speedMultiplier;
                } else {
                    type = 'passenger';
                    eSpeed = 200 * speedMultiplier;
                }

                const size = 35;
                const x = Math.random() * (canvas.width - size);
                entities.push({
                    x: x, y: -size, width: size, height: size, type: type, speed: eSpeed,
                    emoji: type === 'passenger' ? (Math.random() > 0.5 ? '🙋‍♂️' : '🙋‍♀️') : null
                });

                const baseSpawnRate = Math.max(250, 500 - currentRacingLevel * 15);
                const randSpawnRate = Math.max(150, 400 - currentRacingLevel * 10);
                spawnTimeout = setTimeout(spawnEntity, Math.random() * randSpawnRate + baseSpawnRate);
            }
            spawnTimeout = setTimeout(spawnEntity, 800);

            function showTimeBonus(text, color = '#4ade80') {
                if(timeBonusText) {
                    timeBonusText.innerHTML = text;
                    timeBonusText.style.color = color;
                    timeBonusText.style.opacity = '1';
                    setTimeout(() => { if(timeBonusText) timeBonusText.style.opacity = '0'; }, 1500);
                }
            }

            function loop() {
                if(!isPlaying) return;
                if(!document.getElementById('racing-canvas')) {
                    cleanup();
                    return;
                }
                
                animationId = requestAnimationFrame(loop);

                const now = Date.now();
                const dt = (now - lastTime) / 1000;
                lastTime = now;

                if (invincible) {
                    invincibleTimer -= dt;
                    if (invincibleTimer <= 0) {
                        invincible = false;
                    }
                }

                if (now - timerLastTime >= 1000) {
                    gameFuel--;
                    updateGlobalFuel();
                    timerLastTime = now;
                    const timeEl = document.getElementById('racing-time');
                    if (timeEl) timeEl.innerText = gameFuel;
                    
                    if (gameFuel <= 0) {
                        gameFuel = 0;
                        updateGlobalFuel();
                        endGame(true);
                        return;
                    }
                }

                if(leftPressed) car.x -= car.speed * dt;
                if(rightPressed) car.x += car.speed * dt;
                if (car.x < 0) car.x = 0;
                if (car.x + car.width > canvas.width) car.x = canvas.width - car.width;

                for (let i = entities.length - 1; i >= 0; i--) {
                    let e = entities[i];
                    e.y += e.speed * dt;
                    
                    const hitboxMargin = 5;
                    if (car.x + hitboxMargin < e.x + e.width - hitboxMargin &&
                        car.x + car.width - hitboxMargin > e.x + hitboxMargin &&
                        car.y + hitboxMargin < e.y + e.height - hitboxMargin &&
                        car.height + car.y - hitboxMargin > e.y + hitboxMargin) {
                        
                        if (e.type === 'passenger') {
                            taxiTotalScore += 5;
                            const scoreEl = document.getElementById('racing-score');
                            if (scoreEl) scoreEl.innerText = taxiTotalScore;
                        } else if (e.type === 'time') {
                            gameFuel += 5; 
                            updateGlobalFuel();
                            const timeEl = document.getElementById('racing-time');
                            if (timeEl) timeEl.innerText = gameFuel;
                            showTimeBonus('+5 秒 ⛽');
                        } else if (e.type === 'star') {
                            invincible = true;
                            invincibleTimer = 5;
                            showTimeBonus('🌟 無敵 🌟', '#fbbf24');
                        } else if (e.type === 'obstacle') {
                            if (invincible) {
                                taxiTotalScore += 1; 
                                const scoreEl = document.getElementById('racing-score');
                                if (scoreEl) scoreEl.innerText = taxiTotalScore;
                            } else {
                                gameFuel = Math.max(0, gameFuel - 1);
                                updateGlobalFuel();
                                const timeEl = document.getElementById('racing-time');
                                if (timeEl) timeEl.innerText = gameFuel;
                                showTimeBonus('-1 秒 ⛽', '#ef4444');
                                invincible = true;
                                invincibleTimer = 1.5;
                            }
                        }
                        entities.splice(i, 1);
                        continue;
                    }

                    if (e.y > canvas.height) {
                        entities.splice(i, 1);
                    }
                }

                let expectedLevel = 1 + Math.floor(taxiTotalScore / 50);
                if (expectedLevel > currentRacingLevel) {
                    currentRacingLevel = expectedLevel;
                    const levelDisplay = document.getElementById('racing-level-display');
                    if (levelDisplay) levelDisplay.innerText = currentRacingLevel;
                    showTimeBonus(`LEVEL UP!<br/><span style="font-size:20px;">進入第 ${currentRacingLevel} 關</span>`, '#facc15');
                    speedMultiplier = 1 + (currentRacingLevel - 1) * 0.15;
                    obstacleRate = Math.min(0.7, 0.4 + (currentRacingLevel - 1) * 0.05); 
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#1f2937'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; 
                const dashSpeed = invincible ? 10 : 5;
                const dashOffset = (now / dashSpeed) % 60; 
                for(let y = -60; y < canvas.height; y += 60) {
                    ctx.fillRect(canvas.width/3, y + dashOffset, 6, 30);
                    ctx.fillRect((canvas.width/3)*2, y + dashOffset, 6, 30);
                }

                entities.forEach(e => {
                    ctx.save();
                    ctx.font = '34px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    
                    if (e.type === 'passenger') {
                        ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                        ctx.shadowBlur = 10;
                        ctx.fillText(e.emoji, e.x + e.width/2, e.y - 2);
                    } else if (e.type === 'time') {
                        ctx.shadowColor = '#3b82f6'; 
                        ctx.shadowBlur = 15;
                        ctx.fillText('⛽', e.x + e.width/2, e.y - 2);
                    } else if (e.type === 'star') {
                        ctx.shadowColor = '#fbbf24'; 
                        ctx.shadowBlur = 20;
                        ctx.fillText('🌟', e.x + e.width/2, e.y - 2);
                    } else {
                        ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
                        ctx.shadowBlur = 12;
                        ctx.fillText('🚧', e.x + e.width/2, e.y - 2);
                    }
                    ctx.restore();
                });

                ctx.save();
                if (invincible) {
                    ctx.shadowColor = `hsl(${(now / 2) % 360}, 100%, 60%)`;
                    ctx.shadowBlur = 25;
                    if (Math.floor(Date.now() / 150) % 2 === 0) {
                        ctx.globalAlpha = 0.4;
                    }
                } else {
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
                    ctx.shadowBlur = 10;
                    ctx.shadowOffsetY = 5;
                }
                ctx.font = '45px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(invincible ? '🚀' : '🚕', car.x + car.width/2, car.y - 5);
                ctx.restore();
            }
            loop();

        function generateExamPaper() {
            // 1. 取得選擇的單元
            const selectedUnits = Array.from(document.querySelectorAll('.exam-unit-cb:checked')).map(cb => cb.value);
            if (selectedUnits.length === 0) {
                alert('請至少勾選一個測驗單元！');
                return;
            }

            // 2. 取得題型與題數設定
            const useE2C = document.getElementById('exam-type-e2c').checked;
            const countE2C = parseInt(document.getElementById('exam-count-e2c').value, 10) || 0;
            
            const useC2E = document.getElementById('exam-type-c2e').checked;
            const countC2E = parseInt(document.getElementById('exam-count-c2e').value, 10) || 0;
            
            const useMCQ = document.getElementById('exam-type-mcq').checked;
            const countMCQ = parseInt(document.getElementById('exam-count-mcq').value, 10) || 0;
            
            const useScramble = document.getElementById('exam-type-scramble').checked;
            const countScramble = parseInt(document.getElementById('exam-count-scramble').value, 10) || 0;

            if (!useE2C && !useC2E && !useMCQ && !useScramble) {
                alert('請至少勾選一種題型！');
                return;
            }

            // 3. 準備題庫池
            let poolWords = [];
            let poolQuiz = [];
            let poolScramble = [];

            selectedUnits.forEach(unit => {
                if (gameData[unit].words) poolWords.push(...gameData[unit].words);
                if (gameData[unit].popQuiz) poolQuiz.push(...gameData[unit].popQuiz);
                if (gameData[unit].sentenceScramble) poolScramble.push(...gameData[unit].sentenceScramble);
            });

            // 隨機抽選且不重複的輔助函數
            const getUniqueItems = (arr, count, excludeList = []) => {
                const available = arr.filter(item => !excludeList.includes(item));
                const shuffled = [...available].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, Math.min(count, available.length));
            };

            // 4. 抽取題目
            const engToChi = useE2C && countE2C > 0 ? getUniqueItems(poolWords, countE2C) : [];
            const chiToEng = useC2E && countC2E > 0 ? getUniqueItems(poolWords, countC2E, engToChi) : []; // 盡量避免同單字出現在英翻中和中翻英
            const mcq = useMCQ && countMCQ > 0 ? getUniqueItems(poolQuiz, countMCQ) : [];
            const scramble = useScramble && countScramble > 0 ? getUniqueItems(poolScramble, countScramble) : [];

            if (engToChi.length === 0 && chiToEng.length === 0 && mcq.length === 0 && scramble.length === 0) {
                 alert('您選擇的題庫範圍可能沒有足夠的題目，或者您設定的題數為 0，無法生成考卷！');
                 return;
            }

            // 關閉 Modal
            examModal.style.display = 'none';

            // 考卷標題字串
            let examTitle = '';
            if (selectedUnits.length === 8) {
                examTitle = 'Everybody Up 5 總複習測驗卷 (Unit 1 - Unit 8)';
            } else if (selectedUnits.length === 1) {
                // 找出該單元的完整名稱
                const opt = Array.from(unitSelect.options).find(o => o.value === selectedUnits[0]);
                examTitle = `Everybody Up 5 測驗卷 (${opt ? opt.text : selectedUnits[0]})`;
            } else {
                examTitle = `Everybody Up 5 綜合測驗卷 (涵蓋 ${selectedUnits.length} 個單元)`;
            }

            // 動態產生大題 HTML
            let sectionsHtml = '';
            let ansSectionsHtml = '';
            let sectionIndex = 1;
            const cnyNums = ['一', '二', '三', '四', '五'];

            if (engToChi.length > 0) {
                const sectionLabel = `${cnyNums[sectionIndex-1]}、英翻中`;
                sectionsHtml += `
                    <div class="section">
                        <div class="section-title">${sectionLabel}</div>
                        ${engToChi.map((item, idx) => `
                            <div class="question-item">
                                ${idx + 1}. ${item.word}
                                <span class="blank-line"></span>
                            </div>
                        `).join('')}
                    </div>
                `;
                ansSectionsHtml += `
                    <div class="section">
                        <div class="section-title">${sectionLabel}</div>
                        ${engToChi.map((item, idx) => `<div class="ans-item">${idx + 1}. <strong>${item.chinese}</strong></div>`).join('')}
                    </div>
                `;
                sectionIndex++;
            }

            if (chiToEng.length > 0) {
                const sectionLabel = `${cnyNums[sectionIndex-1]}、中翻英`;
                sectionsHtml += `
                    <div class="section">
                        <div class="section-title">${sectionLabel}</div>
                        ${chiToEng.map((item, idx) => `
                            <div class="question-item">
                                ${idx + 1}. ${item.chinese}
                                <span class="blank-line"></span>
                            </div>
                        `).join('')}
                    </div>
                `;
                ansSectionsHtml += `
                    <div class="section">
                        <div class="section-title">${sectionLabel}</div>
                        ${chiToEng.map((item, idx) => `<div class="ans-item">${idx + 1}. <strong>${item.word}</strong></div>`).join('')}
                    </div>
                `;
                sectionIndex++;
            }

            if (mcq.length > 0) {
                const sectionLabel = `${cnyNums[sectionIndex-1]}、選擇題`;
                sectionsHtml += `
                    <div class="section">
                        <div class="section-title">${sectionLabel}</div>
                        ${mcq.map((q, idx) => {
                            const ops = [...q.options].sort(() => 0.5 - Math.random());
                            const labels = ['(A)', '(B)', '(C)', '(D)'];
                            const correctIndex = ops.findIndex(o => o === q.answer);
                            q.correctLabel = labels[correctIndex];

                            return `
                            <div class="question-item">
                                ${idx + 1}. (____) ${q.question}
                                <div class="options">
                                    ${ops.map((o, i) => `<div>${labels[i]} ${o}</div>`).join('')}
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                ansSectionsHtml += `
                    <div class="section">
                        <div class="section-title">${sectionLabel}</div>
                        ${mcq.map((q, idx) => `<div class="ans-item">${idx + 1}. <strong>${q.correctLabel} ${q.answer}</strong></div>`).join('')}
                    </div>
                `;
                sectionIndex++;
            }

            if (scramble.length > 0) {
                const sectionLabel = `${cnyNums[sectionIndex-1]}、句子重組`;
                sectionsHtml += `
                    <div class="section">
                        <div class="section-title">${sectionLabel}</div>
                        ${scramble.map((s, idx) => {
                            const cleanStr = s.replace(/[.,?!]/g, "");
                            const scrambledWords = cleanStr.split(" ").sort(() => 0.5 - Math.random()).join(" / ");
                            return `
                            <div class="question-item" style="margin-bottom: 35px;">
                                ${idx + 1}. ${scrambledWords}
                                <span class="blank-line" style="margin-top: 25px;"></span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                ansSectionsHtml += `
                    <div class="section">
                        <div class="section-title">${sectionLabel}</div>
                        ${scramble.map((s, idx) => `<div class="ans-item">${idx + 1}. <strong>${s}</strong></div>`).join('')}
                    </div>
                `;
                sectionIndex++;
            }

            // 組合 HTML
            const htmlContent = `
                <!DOCTYPE html>
                <html lang="zh-Hant">
                <head>
                    <meta charset="UTF-8">
                    <title>\${examTitle}</title>
                    <style>
                        body {
                            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
                            background-color: #f3f4f6;
                            margin: 0;
                            padding: 20px;
                            color: #111827;
                        }
                        .a4-page {
                            width: 21cm;
                            min-height: 29.7cm;
                            padding: 2cm;
                            margin: auto;
                            background: white;
                            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
                            box-sizing: border-box;
                            position: relative;
                        }
                        .header {
                            text-align: center;
                            margin-bottom: 25px;
                            border-bottom: 3px double #374151;
                            padding-bottom: 15px;
                        }
                        .header h1 {
                            margin: 0 0 15px 0;
                            font-size: 28px;
                            color: #1f2937;
                        }
                        .student-info {
                            display: flex;
                            justify-content: space-between;
                            font-size: 16px;
                            font-weight: bold;
                        }
                        .student-info span {
                            flex: 1;
                            text-align: left;
                        }
                        .section {
                            margin-bottom: 25px;
                        }
                        .section-title {
                            font-size: 18px;
                            font-weight: bold;
                            margin-bottom: 15px;
                            padding-bottom: 5px;
                            border-bottom: 2px dashed #9ca3af;
                            color: #111827;
                        }
                        .two-columns {
                            columns: 2;
                            column-gap: 2cm;
                        }
                        .question-item {
                            break-inside: avoid-column;
                            margin-bottom: 22px;
                            font-size: 16px;
                            line-height: 1.6;
                        }
                        .options {
                            margin-top: 8px;
                            margin-left: 20px;
                            display: flex;
                            flex-direction: column;
                            gap: 5px;
                        }
                        .blank-line {
                            display: inline-block;
                            border-bottom: 1px solid #111827;
                            width: 100%;
                            vertical-align: bottom;
                            margin-top: 25px; /* 留出作答空間 */
                        }
                        .controls {
                            position: fixed;
                            top: 20px;
                            right: 20px;
                            display: flex;
                            gap: 12px;
                            z-index: 100;
                        }
                        .btn {
                            padding: 12px 20px;
                            background: #4f46e5;
                            color: white;
                            border: none;
                            border-radius: 8px;
                            cursor: pointer;
                            font-weight: bold;
                            font-size: 16px;
                            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                            transition: background 0.2s;
                        }
                        .btn:hover { background: #4338ca; }
                        .btn-secondary { background: #10b981; }
                        .btn-secondary:hover { background: #059669; }
                        
                        /* 解答區 */
                        .answer-section {
                            margin-top: 50px;
                            border-top: 4px solid #374151;
                            padding-top: 30px;
                            display: none;
                        }
                        .ans-item {
                            margin-bottom: 8px;
                            font-size: 15px;
                        }
                        .ans-item strong { color: #dc2626; font-family: 'Courier New', monospace; font-size: 16px;}
                        
                        /* 列印專用樣式 */
                        @media print {
                            body { background: white; padding: 0; }
                            .a4-page {
                                box-shadow: none;
                                width: 100%;
                                min-height: auto;
                                padding: 0;
                                margin: 0;
                            }
                            .controls { display: none !important; }
                            /* 如果答案顯示，強制在解答區前換頁 */
                            .answer-section { break-before: page; }
                        }
                    </style>
                </head>
                <body>
                    <!-- 右上角控制按鈕 -->
                    <div class="controls">
                        <button class="btn btn-secondary" onclick="toggleAnswers()" id="toggle-ans-btn">👁️ 顯示解答</button>
                        <button class="btn" onclick="window.print()">🖨️ 列印考卷</button>
                    </div>

                    <div class="a4-page">
                        <!-- 考卷標題與基本資料 -->
                        <div class="header">
                            <h1>\${examTitle}</h1>
                            <div class="student-info">
                                <span>Class (班級): _________________</span>
                                <span>Name (姓名): _________________</span>
                                <span style="text-align: right;">Date: _____ / _____ / _____</span>
                            </div>
                        </div>

                        <!-- 題目區 (雙欄排版) -->
                        <div class="two-columns">
                            \${sectionsHtml}
                        </div>

                        <!-- 答案區 -->
                        <div class="answer-section" id="answer-section">
                            <h2 style="text-align: center; margin-top: 0; color: #1f2937;">解答 (Answer Key)</h2>
                            <div class="two-columns">
                                \${ansSectionsHtml}
                            </div>
                        </div>
                    </div>

                    <!-- 切換顯示答案的腳本 -->
                    <script>
                        function toggleAnswers() {
                            var ans = document.getElementById('answer-section');
                            var btn = document.getElementById('toggle-ans-btn');
                            if (ans.style.display === 'block') {
                                ans.style.display = 'none';
                                btn.innerHTML = '👁️ 顯示解答';
                            } else {
                                ans.style.display = 'block';
                                btn.innerHTML = '🙈 隱藏解答';
                            }
                        }
                    <\\/script>
                </body>
                </html>
            `;

            // 開啟新視窗並寫入考卷
            const printWin = window.open('', '_blank');
            if (printWin) {
                printWin.document.write(htmlContent);
                printWin.document.close();
            } else {
                alert('請允許瀏覽器開啟彈出式視窗，以便顯示生成的考卷！');
            }
        }
    </script>
</body>
</html>
