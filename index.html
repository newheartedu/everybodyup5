<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everybody Up 5 - 英語遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fef2f2 0%, #ffe4e6 50%, #fecdd3 100%);
            background-attachment: fixed;
            color: #1e293b;
            padding: 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(225, 29, 72, 0.12);
            padding: 1.5rem;
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-shadow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .word-token {
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
            touch-action: manipulation;
            font-size: 1.25rem;
            padding: 0.5rem 1rem;
        }
        .word-token:hover {
            transform: translateY(-2px);
        }
        .word-card {
            background-color: #fff;
            border: 2px solid #fecaca;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .word-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(225, 29, 72, 0.15);
            border-color: #fca5a5;
        }
        #rearranged-word {
            min-height: 4rem;
        }
        .match-card {
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s, opacity 0.3s;
        }
        .match-card:hover {
            transform: scale(1.02);
        }
        .match-selected {
            border-color: #f59e0b !important;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.3) !important;
            transform: scale(1.02);
        }
        .pokeball-icon {
            width: 30px;
            height: 30px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .pokemon-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-color: #fff1f2;
            border-radius: 1rem;
            box-shadow: 0 2px 4px rgba(225, 29, 72, 0.05);
            transition: transform 0.2s;
        }
        .pokemon-card:hover {
            transform: scale(1.05);
        }
        .pokemon-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        #new-pokemon-display .pokemon-img {
             width: 150px;
             height: 150px;
        }
        .syllable-block {
            transition: all 0.2s ease;
        }
        .syllable-block:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 8px rgba(225, 29, 72, 0.2);
        }
        #print-area {
            display: none;
        }
        @media print {
            body { background: none !important; margin: 0; padding: 0; }
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; width: 100%; position: absolute; left: 0; top: 0; }
            .print-page { 
                page-break-after: always; 
                width: 100%; 
                max-width: 210mm; 
                margin: 0 auto; 
                padding: 15mm; 
                box-sizing: border-box; 
                background: white; 
            }
            .ws-table { width: 100%; max-width: 160mm; border-collapse: collapse; margin: 0 auto; table-layout: fixed;}
            .ws-cell { border: 1px solid #333; text-align: center; vertical-align: middle; height: 35px; font-size: 18px; font-family: 'Courier New', monospace; font-weight: bold; color: black;}
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="text-gray-700 min-h-screen">
    
    <div class="container my-4 md:my-8">
        <header class="py-4 md:py-6">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4">
                <div class="text-center md:text-left mb-4 md:mb-0">
                    <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-700 to-rose-500 mb-2 tracking-tight drop-shadow-sm">Everybody Up 5</h1>
                    <p class="text-lg text-red-800/70 font-medium">讓我們一起用遊戲學英文！</p>
                    <p class="text-md text-red-600/60 font-semibold mt-1">單字例句卷特訓版 (紅色系)</p>
                </div>
                
                <div class="flex items-center space-x-3 flex-wrap justify-center gap-y-2">
                    <button id="toggle-sound-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-gray-700 shadow-md hover:bg-gray-100 transition-colors text-xl" title="切換語音朗讀">🔊</button>
                    <div class="text-lg font-bold bg-white px-4 py-2 rounded-lg shadow text-rose-700">
                        ⛽ 油量: <span class="fuel-display text-red-500">15</span> 秒
                    </div>
                    <div class="text-lg font-bold bg-white px-4 py-2 rounded-lg shadow">
                        總分: <span id="total-score" class="text-orange-500">0</span>
                    </div>
                    <button id="my-pokemon-btn" class="px-4 py-2 rounded-full bg-red-500 text-white font-bold shadow-md hover:bg-red-600 transition-colors">我的寶可夢 (<span id="pokemon-count">0</span>)</button>
                    <button id="leaderboard-btn" class="px-4 py-2 rounded-full bg-yellow-500 text-white font-bold shadow-md hover:bg-yellow-600 transition-colors">排行榜</button>
                </div>
            </div>
            
            <div class="text-center">
                <div class="flex items-center justify-center space-x-4 text-xl">
                    <span>單元進度球：</span>
                    <div id="pokeball-container" class="flex items-center space-x-1"></div>
                </div>
                <div id="pokemon-reward-area" class="mt-2 text-xl font-bold text-red-500"></div>
                <p id="pokemon-catch-condition" class="text-center text-gray-600 mt-1 font-semibold">每獲得 50 分，就有機會收服一隻新寶可夢！</p>
            </div>
        </header>

        <nav class="flex flex-col md:flex-row justify-center items-center space-y-4 md:space-y-0 md:space-x-6 mb-4 md:mb-8 bg-white/50 p-4 rounded-2xl shadow-sm border border-red-100/60">
            <div class="flex items-center space-x-3">
                <label for="unit-select" class="text-lg font-bold text-red-900">選擇單元:</label>
                <select id="unit-select" class="px-4 py-2 rounded-xl border-2 border-red-200 bg-white text-red-800 shadow-sm focus:outline-none focus:border-red-400 focus:ring-2 focus:ring-red-100 transition-all font-medium">
                    <option value="u1">Unit 1: Vacation</option>
                    <option value="u2">Unit 2: Camping</option>
                    <option value="u3">Unit 3: Class Party</option>
                    <option value="u4">Unit 4: The Amazon Rainforest</option>
                    <option value="u5">Unit 5: Busy Students</option>
                    <option value="u6">Unit 6: Making Things</option>
                    <option value="u7">Unit 7: World Travel</option>
                    <option value="u8">Unit 8: Computers</option>
                </select>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <button id="btn-words-list" class="px-5 py-2.5 rounded-full bg-red-600 text-white font-semibold shadow-md hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-red-700/50 btn-game tracking-wide">單字卡</button>
                <button id="btn-word-breakdown" class="px-5 py-2.5 rounded-full bg-rose-600 text-white font-bold shadow-md hover:bg-rose-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-rose-700/50 btn-game tracking-wide">🧩 拆解單字</button>
                
                <button id="btn-game-mc" class="px-5 py-1.5 flex flex-col items-center justify-center rounded-full bg-orange-600 text-white font-semibold shadow-md hover:bg-orange-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-orange-700/50 btn-game tracking-wide leading-tight">
                    <span class="pointer-events-none">單字測驗</span>
                    <span class="text-xs text-orange-200 font-medium pointer-events-none tracking-normal mt-0.5">✈️ 飛機射擊</span>
                </button>

                <button id="btn-game-word-match" class="px-5 py-2.5 rounded-full bg-red-600 text-white font-semibold shadow-md hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-red-700/50 btn-game tracking-wide">單字配對</button>
                <button id="btn-game-word-fill" class="px-5 py-2.5 rounded-full bg-red-600 text-white font-semibold shadow-md hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-red-700/50 btn-game tracking-wide">單字填空</button>
                <button id="btn-game2" class="px-5 py-1.5 flex flex-col items-center justify-center rounded-full bg-orange-600 text-white font-semibold shadow-md hover:bg-orange-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-orange-700/50 btn-game tracking-wide leading-tight">
                    <span class="pointer-events-none">單字重組</span>
                    <span class="text-xs text-orange-200 font-medium pointer-events-none tracking-normal mt-0.5">🚕 瘋狂計程車</span>
                </button>
                <button id="btn-game-spelling" class="px-5 py-2.5 rounded-full bg-red-600 text-white font-semibold shadow-md hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-red-700/50 btn-game tracking-wide">單字拼寫</button>
                <button id="btn-game4" class="px-5 py-2.5 rounded-full bg-red-600 text-white font-semibold shadow-md hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-red-700/50 btn-game tracking-wide">句子配對</button>
                <button id="btn-game5" class="px-5 py-2.5 rounded-full bg-red-600 text-white font-semibold shadow-md hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-red-700/50 btn-game tracking-wide">句子重組</button>
                <button id="btn-game6" class="px-5 py-2.5 rounded-full bg-red-600 text-white font-semibold shadow-md hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-red-700/50 btn-game tracking-wide">快問快答</button>
                <button id="btn-word-search-sheet" class="px-5 py-2.5 rounded-full bg-green-600 text-white font-semibold shadow-md hover:bg-green-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-green-700/50 btn-game tracking-wide">📄 找字遊戲</button>
                <button id="btn-generate-exam" class="px-5 py-2.5 rounded-full bg-indigo-600 text-white font-semibold shadow-md hover:bg-indigo-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 border border-indigo-700/50 tracking-wide">📝 產生考卷</button>
            </div>
        </nav>

        <main id="game-area" class="p-4 md:p-6 bg-white/70 backdrop-blur-md border border-white/50 rounded-2xl card-shadow min-h-[50vh] flex flex-col justify-center items-center text-center overflow-hidden">
            <p class="text-center text-md md:text-xl text-rose-500 font-medium">請從上方選擇一個單元和遊戲開始！</p>
        </main>
        
        <div id="feedback-message" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-green-500 text-white rounded-xl shadow-lg hidden z-50 text-center leading-tight"></div>
        <div id="error-message" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-red-600 text-white rounded-full shadow-lg hidden z-50">答錯了! 請再試一次。</div>
        <div id="pokeball-message" class="fixed bottom-16 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-rose-500 text-white rounded-full shadow-lg hidden z-50">恭喜你收集到一顆單元進度球！</div>
        <div id="pokemon-toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-gradient-to-r from-yellow-400 to-orange-500 text-white rounded-full shadow-2xl hidden z-[100] text-center font-bold text-lg border-2 border-white"></div>

    </div>

    <!-- Modals -->
    <div id="leaderboard-modal" class="modal">
        <div class="modal-content border-4 border-red-200">
            <h2 class="text-3xl font-bold mb-6 text-yellow-600">🏆 即時排行榜 🏆</h2>
            <div id="leaderboard-list" class="space-y-2 text-left"></div>
            <button id="close-leaderboard-btn" class="mt-6 px-6 py-2 rounded-full bg-gray-500 text-white font-bold hover:bg-gray-600 transition-colors shadow-md">關閉</button>
        </div>
    </div>

    <div id="my-pokemon-modal" class="modal">
        <div class="modal-content border-4 border-red-200">
            <h2 class="text-3xl font-bold mb-6 text-red-600">🐾 我的寶可夢 🐾</h2>
            <div id="my-pokemon-list" class="grid grid-cols-3 md:grid-cols-4 gap-4 max-h-64 overflow-y-auto p-2 bg-red-50 rounded-lg"></div>
            <button id="close-pokemon-btn" class="mt-6 px-6 py-2 rounded-full bg-gray-500 text-white font-bold hover:bg-gray-600 transition-colors shadow-md">關閉</button>
        </div>
    </div>
    
    <div id="new-pokemon-modal" class="modal">
        <div class="modal-content border-4 border-red-300">
            <h2 class="text-3xl font-bold mb-4 text-red-600">太棒了！</h2>
            <p class="text-xl mb-4">你收服了一隻新的寶可夢！</p>
            <div id="new-pokemon-display" class="pokemon-card bg-red-50 py-6 border-2 border-red-100">
                <!-- 新寶可夢內容 -->
            </div>
            <button id="close-new-pokemon-btn" class="mt-6 px-6 py-2 rounded-full bg-red-500 text-white font-bold hover:bg-red-600 transition-colors shadow-md">繼續遊戲</button>
        </div>
    </div>

    <!-- 產生考卷 Modal -->
    <div id="exam-modal" class="modal">
        <div class="modal-content border-4 border-indigo-300 relative max-w-2xl w-11/12">
            <h2 class="text-3xl font-extrabold mb-6 text-indigo-700">📝 客製化 A4 考卷</h2>
            
            <div class="text-left mb-6 space-y-4">
                <!-- 單元選擇區 -->
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                    <div class="flex justify-between items-center mb-3 border-b border-indigo-200 pb-2">
                        <label class="font-bold text-indigo-900 text-lg">一、勾選測驗單元：</label>
                        <div class="space-x-2 text-sm">
                            <button id="exam-sel-all-units" class="text-indigo-600 hover:text-indigo-800 font-bold underline px-2 py-1 rounded hover:bg-indigo-100 transition-colors">全選</button>
                            <button id="exam-sel-no-units" class="text-gray-500 hover:text-gray-700 font-bold underline px-2 py-1 rounded hover:bg-gray-200 transition-colors">全不選</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-2" id="exam-unit-checkboxes">
                        <label class="flex items-center space-x-2 cursor-pointer bg-white p-2 rounded-lg border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><input type="checkbox" value="u1" checked class="exam-unit-cb w-4 h-4 text-indigo-600 rounded"> <span class="font-bold text-gray-700">Unit 1</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white p-2 rounded-lg border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><input type="checkbox" value="u2" class="exam-unit-cb w-4 h-4 text-indigo-600 rounded"> <span class="font-bold text-gray-700">Unit 2</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white p-2 rounded-lg border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><input type="checkbox" value="u3" class="exam-unit-cb w-4 h-4 text-indigo-600 rounded"> <span class="font-bold text-gray-700">Unit 3</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white p-2 rounded-lg border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><input type="checkbox" value="u4" class="exam-unit-cb w-4 h-4 text-indigo-600 rounded"> <span class="font-bold text-gray-700">Unit 4</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white p-2 rounded-lg border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><input type="checkbox" value="u5" class="exam-unit-cb w-4 h-4 text-indigo-600 rounded"> <span class="font-bold text-gray-700">Unit 5</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white p-2 rounded-lg border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><input type="checkbox" value="u6" class="exam-unit-cb w-4 h-4 text-indigo-600 rounded"> <span class="font-bold text-gray-700">Unit 6</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white p-2 rounded-lg border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><input type="checkbox" value="u7" class="exam-unit-cb w-4 h-4 text-indigo-600 rounded"> <span class="font-bold text-gray-700">Unit 7</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer bg-white p-2 rounded-lg border border-indigo-100 shadow-sm hover:bg-indigo-100 transition-colors"><input type="checkbox" value="u8" class="exam-unit-cb w-4 h-4 text-indigo-600 rounded"> <span class="font-bold text-gray-700">Unit 8</span></label>
                    </div>
                </div>

                <!-- 題型與題數設定區 -->
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                    <label class="block font-bold text-indigo-900 text-lg mb-3 border-b border-indigo-200 pb-2">二、設定題型與題數：</label>
                    <div class="space-y-3 px-2">
                        <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-indigo-100 shadow-sm">
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="checkbox" id="exam-type-e2c" checked class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500">
                                <span class="font-bold text-gray-800 text-lg">英翻中</span>
                            </label>
                            <div class="flex items-center space-x-2">
                                <input type="number" id="exam-count-e2c" value="10" min="1" max="50" class="w-16 p-1.5 border-2 border-indigo-200 rounded-lg text-center font-bold text-indigo-900 focus:border-indigo-500 outline-none">
                                <span class="font-medium text-gray-600">題</span>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-indigo-100 shadow-sm">
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="checkbox" id="exam-type-c2e" checked class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500">
                                <span class="font-bold text-gray-800 text-lg">中翻英</span>
                            </label>
                            <div class="flex items-center space-x-2">
                                <input type="number" id="exam-count-c2e" value="10" min="1" max="50" class="w-16 p-1.5 border-2 border-indigo-200 rounded-lg text-center font-bold text-indigo-900 focus:border-indigo-500 outline-none">
                                <span class="font-medium text-gray-600">題</span>
                            </div>
                        </div>

                        <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-indigo-100 shadow-sm">
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="checkbox" id="exam-type-mcq" checked class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500">
                                <span class="font-bold text-gray-800 text-lg">選擇題 <span class="text-sm font-medium text-gray-500">(詞彙)</span></span>
                            </label>
                            <div class="flex items-center space-x-2">
                                <input type="number" id="exam-count-mcq" value="10" min="1" max="50" class="w-16 p-1.5 border-2 border-indigo-200 rounded-lg text-center font-bold text-indigo-900 focus:border-indigo-500 outline-none">
                                <span class="font-medium text-gray-600">題</span>
                            </div>
                        </div>

                        <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-indigo-100 shadow-sm">
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="checkbox" id="exam-type-scramble" checked class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500">
                                <span class="font-bold text-gray-800 text-lg">句子重組</span>
                            </label>
                            <div class="flex items-center space-x-2">
                                <input type="number" id="exam-count-scramble" value="5" min="1" max="20" class="w-16 p-1.5 border-2 border-indigo-200 rounded-lg text-center font-bold text-indigo-900 focus:border-indigo-500 outline-none">
                                <span class="font-medium text-gray-600">題</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex justify-center gap-4 mt-8">
                <button id="close-exam-btn" class="px-6 py-3 rounded-full bg-gray-400 text-white font-bold text-lg hover:bg-gray-500 shadow-md transition-colors w-1/3">取消</button>

        import { getFirestore, doc, getDoc, setDoc, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, userId, userName;
        let totalScore = 0;
        let collectedPokemon = [];
        let leaderboardData = [];
        let unsubscribeLeaderboard = null;
        const scorePerCorrect = 10;
        const scoreForNewPokemon = 50; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id-eu5';
        const leaderboardCollectionPath = `/artifacts/${appId}/public/data/leaderboard_eu5`;

        async function initFirebase() {
            try {
                const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                userId = auth.currentUser.uid;
                await loadUserData();
                setupLeaderboardListener();
                simulateOpponents();

            } catch (error) {
                console.error("Firebase 初始化失敗:", error);
            }
        }
        
        async function loadUserData() {
            const userDocRef = doc(db, leaderboardCollectionPath, userId);
            const userDocSnap = await getDoc(userDocRef);

            if (userDocSnap.exists()) {
                const data = userDocSnap.data();
                userName = data.name || `Player-${userId.substring(0, 6)}`;
                totalScore = data.score || 0;
                collectedPokemon = data.collectedPokemon || [];
            } else {
                userName = `Player-${userId.substring(0, 6)}`;
                totalScore = 0;
                collectedPokemon = [];
                await saveUserData(); 
            }
            updateUIDisplays();
        }

        async function saveUserData() {
            if (!db || !userId || !userName) return;
            const userDocRef = doc(db, leaderboardCollectionPath, userId);
            try {
                await setDoc(userDocRef, { 
                    name: userName, 
                    score: totalScore,
                    collectedPokemon: collectedPokemon
                }, { merge: true });
            } catch (error) {
                console.error("儲存使用者資料失敗:", error);
            }
        }

        function updateUIDisplays() {
            document.getElementById('total-score').textContent = totalScore;
            document.getElementById('pokemon-count').textContent = collectedPokemon.length;
        }

        window.handleCorrectAnswer = (points = scorePerCorrect) => {
            const oldScore = totalScore;
            totalScore += points;
            
            if (Math.floor(oldScore / scoreForNewPokemon) < Math.floor(totalScore / scoreForNewPokemon)) {
                window.grantPokemonReward();
            }

            updateUIDisplays();
            saveUserData();
        };

        function setupLeaderboardListener() {
            if (unsubscribeLeaderboard) unsubscribeLeaderboard(); 

            const q = query(collection(db, leaderboardCollectionPath));
            unsubscribeLeaderboard = onSnapshot(q, (querySnapshot) => {
                const scores = [];
                querySnapshot.forEach((doc) => {
                    scores.push({ id: doc.id, ...doc.data() });
                });
                scores.sort((a, b) => (b.score || 0) - (a.score || 0));
                leaderboardData = scores;

                if (document.getElementById('leaderboard-modal').style.display === 'block') {
                    renderLeaderboardUI();
                }
            }, (error) => {
                console.error("監聽排行榜失敗:", error);
            });
        }

        function renderLeaderboardUI() {
            const leaderboardList = document.getElementById('leaderboard-list');
            leaderboardList.innerHTML = '';
            if (leaderboardData.length === 0) {
                leaderboardList.innerHTML = '<p>目前沒有紀錄。</p>';
                return;
            }

            leaderboardData.slice(0, 10).forEach((data, index) => {
                const rank = index + 1;
                const rankEmoji = ["🥇", "🥈", "🥉"][rank - 1] || `${rank}.`;
                const isCurrentUser = data.id === userId;
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-2 rounded-lg ${isCurrentUser ? 'bg-red-100' : ''}`;
                item.innerHTML = `
                    <span class="font-bold text-lg w-12">${rankEmoji}</span>
                    <span class="flex-1 font-semibold ${isCurrentUser ? 'text-red-700' : ''}">${data.name || '匿名'} ${isCurrentUser ? '(你)' : ''}</span>
                    <span class="font-bold text-orange-500">${data.score || 0}分</span>
                `;
                leaderboardList.appendChild(item);
            });
        }

        function showLeaderboard() {
            document.getElementById('leaderboard-modal').style.display = 'block';
            renderLeaderboardUI(); 
        }

        function simulateOpponents() {
            const bots = [
                { id: 'bot-1', name: 'Speedy Sam' },
                { id: 'bot-2', name: 'Clever Clara' },
                { id: 'bot-3', name: 'Brainy Ben' },
                { id: 'bot-4', name: 'Genius Gina' }
            ];

            setInterval(async () => {
                if (!db) return;
                try {
                    const randomBot = bots[Math.floor(Math.random() * bots.length)];
                    const botDocRef = doc(db, leaderboardCollectionPath, randomBot.id);
                    const botDocSnap = await getDoc(botDocRef);
                    
                    let currentScore = 0;
                    if (botDocSnap.exists()) {
                        currentScore = botDocSnap.data().score || 0;
                    }
                    
                    const scoreIncrement = Math.floor(Math.random() * 15) + 5; 
                    const newScore = currentScore + scoreIncrement;

                    await setDoc(botDocRef, {
                        name: randomBot.name,
                        score: newScore
                    }, { merge: true });

                } catch (error) {
                    console.error("模擬對手失敗:", error);
                }

        }

    <script>
        const speechSynthesizer = window.speechSynthesis;
        let voices = [];

        function setVoice() {
            voices = speechSynthesizer.getVoices().filter(voice => voice.lang.startsWith('en-'));
        }

        if (speechSynthesizer.onvoiceschanged !== undefined) {
            speechSynthesizer.onvoiceschanged = setVoice;
        }
        setVoice(); 
        
        let isSoundMuted = false;
        
        const toggleSoundBtn = document.getElementById('toggle-sound-btn');
        if (toggleSoundBtn) {
            toggleSoundBtn.addEventListener('click', () => {
                isSoundMuted = !isSoundMuted;
                toggleSoundBtn.textContent = isSoundMuted ? '🔇' : '🔊';
                if (isSoundMuted && speechSynthesizer.speaking) {
                    speechSynthesizer.cancel();
                }
            });
        }
        
        const speakWord = (text, rate = 0.95) => {
            if (isSoundMuted) return;
            if (speechSynthesizer.speaking) speechSynthesizer.cancel(); 
            
            if (voices.length === 0) {
                setVoice();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            
            let selectedVoice = null;
            
            const voicePreferences = [
                v => v.name.includes('Siri') && v.lang === 'en-US',
                v => v.name.includes('Premium') && v.lang === 'en-US',
                v => v.name.includes('Enhanced') && v.lang === 'en-US',
                v => v.name.includes('Google') && !v.localService && v.lang === 'en-US', 
                v => v.name === 'Google US English', 
                v => v.name.includes('Samantha'), 
                v => v.name.includes('Daniel'), 
                v => v.name.includes('Microsoft Aria'), 
                v => !v.localService && v.lang === 'en-US', 
                v => v.lang === 'en-US' 
            ];

            for (let pref of voicePreferences) {
                selectedVoice = voices.find(pref);
                if (selectedVoice) break;
            }

            if (!selectedVoice && voices.length > 0) {
                selectedVoice = voices[0];
            }

            if (selectedVoice) utterance.voice = selectedVoice;
            
            utterance.lang = 'en-US';
            utterance.pitch = 1.0; 
            utterance.rate = rate; 
            
            speechSynthesizer.speak(utterance);
        };

        function getWordSyllables(word) {
            const w = word.toLowerCase();
            if (wordBreakdownDict[w] && wordBreakdownDict[w].syl) {
                return wordBreakdownDict[w].syl;
            }
            const chunks = w.match(/[^aeiouy]*[aeiouy]+(?:[^aeiouy]*$|[^aeiouy](?=[^aeiouy]))?/gi);
            return chunks || [word];
        }

        function getWordTip(word) {
            const w = word.toLowerCase();
            if (wordBreakdownDict[w] && wordBreakdownDict[w].tip) {
                return wordBreakdownDict[w].tip;
            }
            if (w.endsWith('e') && w.length > 3) return "字尾有不發音的 e，會讓前面的母音發「長母音」喔！";
            if (w.includes('oo') || w.includes('ee') || w.includes('ea') || w.includes('ou')) return "注意看連續兩個母音的組合，通常會發長音！";
            if (w.includes('th') || w.includes('sh') || w.includes('ch') || w.includes('ph')) return "注意複合子音 (th, sh, ch, ph) 發出的一個特別聲音！";
            if (w.length >= 8) return "這個字比較長，我們可以把它切成好幾個小方塊，分段唸出來就很好背了！";
            if (w.length <= 4) return "這個字很短，跟著自然發音規則唸一次就背起來囉！";
            return "跟著音節區塊，看著色塊幫助記憶，再聽一次發音！";
        }

                const steps = Math.max(dx, dy);
                const stepX = dx === 0 ? 0 : (x2 - x1) / dx;
                const stepY = dy === 0 ? 0 : (y2 - y1) / dy;

                const line = [];

        function generateWordSearchGrid(wordsList, directions) {
            const size = 16;
            let grid = Array(size).fill(null).map(() => Array(size).fill(''));
            let placed = [];

            let wordsToPlace = [...wordsList].sort((a, b) => b.word.length - a.word.length);

            for (let wordObj of wordsToPlace) {
                let w = wordObj.word.toUpperCase().replace(/[^A-Z]/g, '');
                if (!w) continue;

                let placedSuccessfully = false;
                let attempts = 0;
                while (!placedSuccessfully && attempts < 500) {
                    let dir = directions[Math.floor(Math.random() * directions.length)];
                    let dx = dir[0], dy = dir[1];

                    let startX = Math.floor(Math.random() * size);
                    let startY = Math.floor(Math.random() * size);

                    let endX = startX + dx * (w.length - 1);
                    let endY = startY + dy * (w.length - 1);

                    if (endX >= 0 && endX < size && endY >= 0 && endY < size) {
                        let canPlace = true;
                        for (let i = 0; i < w.length; i++) {
                            let cx = startX + dx * i;
                            let cy = startY + dy * i;
                            if (grid[cy][cx] !== '' && grid[cy][cx] !== w[i]) {
                                canPlace = false;
                                break;
                            }
                        }

                        if (canPlace) {
                            let wordCoords = [];
                            for (let i = 0; i < w.length; i++) {
                                let cx = startX + dx * i;
                                let cy = startY + dy * i;
                                grid[cy][cx] = w[i];
                                wordCoords.push({x: cx, y: cy});
                            }
                            placed.push({word: w, original: wordObj.word, chinese: wordObj.chinese, coords: wordCoords});
                            placedSuccessfully = true;
                        }
                    }
                    attempts++;
                }
            }

            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let r=0; r<size; r++){
                for(let c=0; c<size; c++){
                    if(grid[r][c] === ''){
                        grid[r][c] = alphabet[Math.floor(Math.random() * alphabet.length)];
                    }
                }
            }

            return { grid, placed };
        }

        function renderMCQuiz() {

            document.getElementById('btn-switch-airplane').onclick = () => {

                        btn.innerHTML = originalHTML;
                        btn.classList.replace('from-gray-500', 'from-red-500');
                        btn.classList.replace('to-gray-600', 'to-rose-600');

                    return;

                btn.onclick = () => {
                    if (option === correctAnswer) {
                        showCorrectMessage();
                        if (!isEngToChi) speakWord(correctAnswer); 
                        
                        btn.classList.remove('bg-red-50', 'text-red-900', 'border-red-200');
                        btn.classList.add('bg-green-500', 'text-white', 'border-green-600');

                        setTimeout(() => {
                            if (!window.isMinigameActive && currentGameId === 'btn-game-mc') {
                                renderMCQuiz();

                        }, 1500);
                    } else {
                        showErrorMessage();
                        btn.classList.remove('bg-red-50', 'text-red-900', 'border-red-200');
                        btn.classList.add('bg-rose-500', 'text-white', 'border-rose-600');
                        setTimeout(() => {
                            btn.classList.remove('bg-rose-500', 'text-white', 'border-rose-600');
                            btn.classList.add('bg-red-50', 'text-red-900', 'border-red-200');

        function startAirplaneMinigame() {
            window.isMinigameActive = true;
            currentAirplaneLevel = 1 + Math.floor(airplaneTotalScore / 50);

            const targetArea = window.currentGameContentArea || gameArea;

            let instText = "滑動飛機擊落敵軍，收集金幣 💰 賺分！";

            targetArea.innerHTML = `

                    <div id="airplane-canvas-container" class="relative bg-slate-900 rounded-xl overflow-hidden shadow-2xl border-4 border-slate-700 cursor-pointer" style="width: 100%; max-width: 320px; height: 450px; touch-action: none;">
                        
                        <!-- 背景 -->
                        <div class="absolute inset-0 opacity-30" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px; animation: scrollBackground 5s linear infinite;"></div>
                        
                        <canvas id="airplane-canvas" width="320" height="450" class="w-full h-full block relative z-10"></canvas>
                        
                        <!-- 返回答題按鈕 -->
                        <button id="btn-back-quiz" class="absolute top-2 right-2 px-3 py-1 bg-white/20 hover:bg-white/40 text-white text-sm rounded-full z-40 font-bold backdrop-blur-sm border border-white/50 transition-colors shadow-lg">
                            🔙 返回答題
                        </button>

                        <!-- UI 介面 -->
                        <div class="absolute top-2 left-2 flex flex-col pointer-events-none z-30 drop-shadow-md">
                            <span class="text-white font-extrabold text-lg">⛽ <span id="airplane-time" class="text-red-400">${gameFuel}</span>s</span>
                            <span class="text-yellow-400 font-extrabold text-lg">💯 <span id="airplane-score">${airplaneTotalScore}</span></span>
                            <span class="text-purple-400 font-extrabold text-lg">🎖️ Lv.<span id="airplane-level-display">${currentAirplaneLevel}</span></span>
                            <span id="airplane-power-timer" class="text-orange-400 font-bold text-sm transition-opacity duration-200 opacity-0">💥 0s</span>
                        </div>

                        <!-- 狀態提示 -->
                        <div id="airplane-buff-text" class="absolute top-1/3 left-0 w-full text-center text-yellow-300 font-extrabold text-3xl opacity-0 transition-opacity duration-300 z-20 drop-shadow-lg pointer-events-none" style="text-shadow: 0px 4px 10px rgba(0,0,0,0.8);">POWER UP!</div>

                        <!-- 結算畫面 -->
                        <div id="airplane-overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-white hidden z-50 backdrop-blur-sm p-4 text-center">
                            <h3 class="text-3xl font-extrabold mb-2 text-red-400">⛽ 油量耗盡！</h3>
                            <p class="text-xl mb-4">目前累積空戰分數: <span id="airplane-final-score" class="text-yellow-400 font-bold mx-1">0</span></p>
                            <p class="text-md text-white/80 font-bold mb-6">快返回答題賺取更多油量！</p>
                            <button id="airplane-continue-btn" class="px-8 py-3 bg-gradient-to-r from-red-500 to-rose-500 rounded-full text-white font-bold text-lg hover:shadow-lg hover:scale-105 transition-transform shadow-lg border border-white/30">🔙 去答題賺油量</button>
                        </div>
                        
                        <!-- 開始提示 -->
                        <div id="airplane-start-hint" class="absolute inset-0 flex items-center justify-center pointer-events-none z-20 transition-opacity duration-500">
                             <p class="text-xl text-white font-bold bg-black/50 px-6 py-2 rounded-full">左右移動，自動射擊</p>
                        </div>
                    </div>
                    <p class="mt-4 text-sm font-medium text-gray-500 bg-white/60 px-3 py-1 rounded-md">💻 電腦：左右方向鍵 / 📱 手機：按住左右滑動</p>
                </div>
            `;

            const canvas = document.getElementById('airplane-canvas');
            const ctx = canvas.getContext('2d');
            const startHint = document.getElementById('airplane-start-hint');
            const buffText = document.getElementById('airplane-buff-text');
            
            let isPlaying = true;
            let lastTime = Date.now();
            let timerLastTime = Date.now();

            let difficultyMultiplier = 1 + (currentAirplaneLevel - 1) * 0.2; 
            
            let plane = { x: 140, y: 380, width: 40, height: 40, speed: window.airplaneState.speed };
            let bullets = [];
            let enemies = [];
            let items = [];
            
            let invincible = false;
            let invincibleTimer = 0;

            let fireCooldown = 0;
            let fireRate = window.airplaneState.fireRate; 
            
            let bulletLevel = 1; 
            window.airplaneState.bulletLevel = 1; 
            let powerUpTimer = 0;

            let leftPressed = false;
            let rightPressed = false;

            const handleKeyDown = (e) => {
                if(e.key === 'ArrowLeft') { leftPressed = true; startHint.style.opacity = '0'; }
                if(e.key === 'ArrowRight') { rightPressed = true; startHint.style.opacity = '0'; }
            };
            const handleKeyUp = (e) => {
                if(e.key === 'ArrowLeft') leftPressed = false;
                if(e.key === 'ArrowRight') rightPressed = false;
            };

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);

            const container = document.getElementById('airplane-canvas-container');
            let isDragging = false;
            
            const updatePlanePos = (clientX) => {
                startHint.style.opacity = '0';
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const x = (clientX - rect.left) * scaleX;
                plane.x = x - plane.width / 2;
                if (plane.x < 0) plane.x = 0;
                if (plane.x + plane.width > canvas.width) plane.x = canvas.width - plane.width;
            };

            const handleMouseDown = (e) => { isDragging = true; updatePlanePos(e.clientX); };
            const handleMouseMove = (e) => { if(isDragging) updatePlanePos(e.clientX); };
            const handleMouseUp = () => { isDragging = false; };
            
            const handleTouchStart = (e) => { isDragging = true; updatePlanePos(e.touches[0].clientX); };
            const handleTouchMove = (e) => { if(isDragging) { e.preventDefault(); updatePlanePos(e.touches[0].clientX); } };
            const handleTouchEnd = () => { isDragging = false; };

            container.addEventListener('mousedown', handleMouseDown);
            container.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            container.addEventListener('touchstart', handleTouchStart, {passive: false});
            container.addEventListener('touchmove', handleTouchMove, {passive: false});
            window.addEventListener('touchend', handleTouchEnd);

            document.getElementById('btn-back-quiz').onclick = (e) => {
                e.stopPropagation();
                endGame(false); 
            };

            let spawnTimeout;
            let itemSpawnTimeout;
            let animationId;

            function cleanup() {
                isPlaying = false;
                window.isMinigameActive = false;
                clearTimeout(spawnTimeout);
                clearTimeout(itemSpawnTimeout);
                cancelAnimationFrame(animationId);
                
                window.removeEventListener('keydown', handleKeyDown);
                window.removeEventListener('keyup', handleKeyUp);
                if (container) {
                    container.removeEventListener('mousedown', handleMouseDown);
                    container.removeEventListener('mousemove', handleMouseMove);
                    container.removeEventListener('touchstart', handleTouchStart);
                    container.removeEventListener('touchmove', handleTouchMove);
                }
                window.removeEventListener('mouseup', handleMouseUp);
                window.removeEventListener('touchend', handleTouchEnd);
            }
            window.cleanupCurrentGame = cleanup;

            function spawnEnemy() {
                if(!isPlaying || !document.getElementById('airplane-canvas')) return;
                
                const rand = Math.random();
                let type = 'normal'; 
                let eSpeed = (100 + currentAirplaneLevel * 5) * difficultyMultiplier;
                let eHp = 1 + Math.floor(currentAirplaneLevel / 4);
                let eSize = 35;
                let emoji = '👾';
                
                if (currentAirplaneLevel >= 5 && rand < 0.05) {
                    type = 'boss';
                    eSpeed = 40 * difficultyMultiplier;
                    eHp = 20 + currentAirplaneLevel * 5;
                    eSize = 75;
                    emoji = '🚜'; 
                } else if (currentAirplaneLevel >= 3 && rand < 0.2) {
                    type = 'tank'; 
                    eSpeed = 60 * difficultyMultiplier;
                    eHp = 4 + Math.floor(currentAirplaneLevel * 1.5);
                    eSize = 45;
                    emoji = '🚁';
                } else if (currentAirplaneLevel >= 2 && rand < 0.4) {
                    type = 'fast'; 
                    eSpeed = (200 + currentAirplaneLevel * 15) * difficultyMultiplier;
                    eHp = 1 + Math.floor(currentAirplaneLevel / 5);
                    emoji = '🛸';
                }

                const x = Math.random() * (canvas.width - eSize);
                enemies.push({
                    x: x, y: -eSize, width: eSize, height: eSize, type: type, speed: eSpeed, hp: eHp, maxHp: eHp, emoji: emoji
                });

                const baseSpawnRate = Math.max(400, 1000 - currentAirplaneLevel * 40);
                const randSpawnRate = Math.max(200, 500 - currentAirplaneLevel * 20);
                spawnTimeout = setTimeout(spawnEnemy, Math.random() * randSpawnRate + baseSpawnRate);
            }
            spawnTimeout = setTimeout(spawnEnemy, 500);

            function spawnCoinOrBuff() {
                if(!isPlaying || !document.getElementById('airplane-canvas')) return;
                let type = 'coin';
                let rand = Math.random();
                
                if (currentAirplaneLevel >= 2) {
                    if (rand < 0.1) type = 'power';
                    else if (rand < 0.2) type = 'fireRate';
                    else if (rand < 0.3) type = 'boost';
                }

                items.push({ x: Math.random() * (canvas.width - 30), y: -30, w: 30, h: 30, type: type });
                itemSpawnTimeout = setTimeout(spawnCoinOrBuff, 1000 + Math.random() * 1500);
            }
            itemSpawnTimeout = setTimeout(spawnCoinOrBuff, 1000);

            function showBuffText(msg, color) {
                if (buffText) {
                    buffText.innerHTML = msg;
                    buffText.style.color = color;
                    buffText.style.opacity = '1';
                    setTimeout(() => { if(buffText) buffText.style.opacity = '0'; }, 1500);
                }
            }

            function loop() {
                if(!isPlaying) return;
                if(!document.getElementById('airplane-canvas')) {
                    cleanup();
                    return;
                }
                
                animationId = requestAnimationFrame(loop);

                const now = Date.now();
                const dt = (now - lastTime) / 1000;
                lastTime = now;

                if (invincible) {
                    invincibleTimer -= dt;
                    if (invincibleTimer <= 0) invincible = false;
                }

                if (powerUpTimer > 0) {
                    powerUpTimer -= dt;
                    const powerTimerEl = document.getElementById('airplane-power-timer');
                    if (powerTimerEl) {
                        powerTimerEl.style.opacity = '1';
                        powerTimerEl.innerText = `💥 ${Math.ceil(powerUpTimer)}s`;
                    }
                    if (powerUpTimer <= 0) {
                        powerUpTimer = 0;
                        bulletLevel = 1;
                        window.airplaneState.bulletLevel = bulletLevel;
                        showBuffText('火力恢復 📉', '#9ca3af');
                        if (powerTimerEl) {
                            powerTimerEl.style.opacity = '0';
                        }
                    }
                }

                if (now - timerLastTime >= 1000) {
                    gameFuel--;
                    updateGlobalFuel(); 
                    timerLastTime = now;
                    const timeEl = document.getElementById('airplane-time');
                    if (timeEl) timeEl.innerText = gameFuel;
                    
                    if (gameFuel <= 0) {
                        gameFuel = 0;
                        updateGlobalFuel();
                        endGame(true); 
                        return;
                    }
                }

                if(leftPressed) plane.x -= plane.speed * dt;
                if(rightPressed) plane.x += plane.speed * dt;
                if (plane.x < 0) plane.x = 0;
                if (plane.x + plane.width > canvas.width) plane.x = canvas.width - plane.width;

                fireCooldown -= dt;
                if (fireCooldown <= 0) {
                    const bulletSpeed = -400;
                    if (bulletLevel === 1) {
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: 0, vy: bulletSpeed, emoji: '💧'});
                    } else if (bulletLevel === 2) {
                        bullets.push({x: plane.x + plane.width*0.2, y: plane.y, w: 10, h: 20, vx: 0, vy: bulletSpeed, emoji: '🔥'});
                        bullets.push({x: plane.x + plane.width*0.8 - 10, y: plane.y, w: 10, h: 20, vx: 0, vy: bulletSpeed, emoji: '🔥'});
                    } else if (bulletLevel === 3) {
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: 0, vy: bulletSpeed, emoji: '⭐'});
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: -100, vy: bulletSpeed, emoji: '⭐'});
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: 100, vy: bulletSpeed, emoji: '⭐'});
                    } else { 
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: 0, vy: bulletSpeed, emoji: '🚀'});
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: -80, vy: bulletSpeed, emoji: '🚀'});
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: 80, vy: bulletSpeed, emoji: '🚀'});
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: -160, vy: bulletSpeed, emoji: '🚀'});
                        bullets.push({x: plane.x + plane.width/2 - 5, y: plane.y, w: 10, h: 20, vx: 160, vy: bulletSpeed, emoji: '🚀'});
                    }
                    fireCooldown = fireRate;
                }

                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    b.x += b.vx * dt;
                    b.y += b.vy * dt;
                    if (b.y < -20 || b.x < -20 || b.x > canvas.width + 20) bullets.splice(i, 1);
                }

                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    item.y += 120 * dt; 
                    
                    if (plane.x < item.x + item.w && plane.x + plane.width > item.x &&
                        plane.y < item.y + item.h && plane.y + plane.height > item.y) {
                        
                        if (item.type === 'coin') {
                            airplaneTotalScore += 5; 
                        } else if (item.type === 'power') {
                            bulletLevel = Math.min(4, bulletLevel + 1);
                            window.airplaneState.bulletLevel = bulletLevel;
                            powerUpTimer = 15; 
                            showBuffText('火力升級 💥', '#fbbf24');
                        } else if (item.type === 'fireRate') {
                            fireRate = Math.max(0.08, fireRate - 0.05); 
                            window.airplaneState.fireRate = fireRate;
                            showBuffText('攻速提升 ⚡', '#3b82f6');
                        } else if (item.type === 'boost') {
                            plane.speed = Math.min(500, plane.speed + 50); 
                            window.airplaneState.speed = plane.speed;
                            showBuffText('機動提升 💨', '#10b981');
                        }
                        
                        const scoreEl = document.getElementById('airplane-score');
                        if (scoreEl) scoreEl.innerText = airplaneTotalScore;
                        
                        items.splice(i, 1);
                        continue;
                    }
                    if (item.y > canvas.height) items.splice(i, 1);
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i];
                    e.y += e.speed * dt;
                    
                    let hit = false;
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        if (b.x < e.x + e.width && b.x + b.w > e.x &&
                            b.y < e.y + e.height && b.y + b.h > e.y) {
                            
                            e.hp--;
                            bullets.splice(j, 1);
                            hit = true;
                            
                            if (e.hp <= 0) {
                                let pts = 1;
                                if (e.type === 'boss') pts = 10;
                                else if (e.type === 'tank') pts = 3;
                                else if (e.type === 'fast') pts = 2;
                                
                                airplaneTotalScore += pts;
                                
                                const scoreEl = document.getElementById('airplane-score');
                                if (scoreEl) scoreEl.innerText = airplaneTotalScore;
                                
                                if (e.type === 'boss') {
                                    for(let k=0; k<3; k++) {
                                        items.push({
                                            x: e.x + (k*20), y: e.y, w: 30, h: 30, 
                                            type: ['coin', 'power', 'fireRate', 'boost'][Math.floor(Math.random() * 4)]
                                        });
                                    }
                                } else if (currentAirplaneLevel >= 2 && Math.random() < 0.25) {
                                    const dropTypes = ['coin', 'coin', 'coin', 'power', 'fireRate', 'boost'];
                                    items.push({
                                        x: e.x + e.width/2 - 15, y: e.y, w: 30, h: 30, 
                                        type: dropTypes[Math.floor(Math.random() * dropTypes.length)]
                                    });
                                }
                                
                                enemies.splice(i, 1);
                                break; 
                            }
                        }
                    }
                    if (hit && !enemies[i]) continue; 

                    const hitboxMargin = 5;
                    if (plane.x + hitboxMargin < e.x + e.width - hitboxMargin &&
                        plane.x + plane.width - hitboxMargin > e.x + hitboxMargin &&
                        plane.y + hitboxMargin < e.y + e.height - hitboxMargin &&
                        plane.height + plane.y - hitboxMargin > e.y + hitboxMargin) {
                        
                        if (!invincible) {
                            gameFuel = Math.max(0, gameFuel - 1);
                            updateGlobalFuel();
                            
                            const timeEl = document.getElementById('airplane-time');
                            if (timeEl) timeEl.innerText = gameFuel;
                            
                            showBuffText('-1 秒 ⛽', '#ef4444');
                            invincible = true;
                            invincibleTimer = 1.5;
                        }
                        continue;
                    }

                    if (e.y > canvas.height) enemies.splice(i, 1);
                }

                let expectedLevel = 1 + Math.floor(airplaneTotalScore / 50);
                if (expectedLevel > currentAirplaneLevel) {
                    currentAirplaneLevel = expectedLevel;
                    const levelDisplay = document.getElementById('airplane-level-display');
                    if (levelDisplay) levelDisplay.innerText = currentAirplaneLevel;
                    showBuffText(`LEVEL UP!<br/><span style="font-size:20px;">進入第 ${currentAirplaneLevel} 關</span>`, '#a855f7');
                    difficultyMultiplier = 1 + (currentAirplaneLevel - 1) * 0.2;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                ctx.font = '28px sans-serif';
                items.forEach(item => {
                    let icon = '💰';
                    if (item.type === 'power') icon = '💥';
                    if (item.type === 'fireRate') icon = '⚡';
                    if (item.type === 'boost') icon = '💨';
                    ctx.fillText(icon, item.x + item.w/2, item.y);
                });

                ctx.font = '20px sans-serif';
                bullets.forEach(b => {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'white';
                    ctx.fillText(b.emoji, b.x + b.w/2, b.y);
                });

                enemies.forEach(e => {
                    ctx.font = `${e.width * 0.8}px sans-serif`;
                    ctx.shadowBlur = 0;
                    ctx.fillText(e.emoji, e.x + e.width/2, e.y);
                    
                    if (e.maxHp > 1) {
                        ctx.fillStyle = 'red';
                        ctx.fillRect(e.x, e.y - 8, e.width, 4);
                        ctx.fillStyle = '#10b981'; 
                        ctx.fillRect(e.x, e.y - 8, e.width * (e.hp / e.maxHp), 4);
                    }
                });

                ctx.font = '40px sans-serif';
                ctx.shadowColor = '#818cf8';
                ctx.shadowBlur = 15;
                if (invincible) {
                    if (Math.floor(Date.now() / 150) % 2 === 0) {
                        ctx.globalAlpha = 0.4;
                    }
                }
                ctx.fillText('✈️', plane.x + plane.width/2, plane.y - 5);
                
                ctx.restore();
            }
            loop();

            function endGame(isFuelEmpty) {
                cleanup();
                window.cleanupCurrentGame = null;

                if (isFuelEmpty) {
                    const overlay = document.getElementById('airplane-overlay');
                    if (overlay) overlay.classList.remove('hidden');
                    
                    const finalScore = document.getElementById('airplane-final-score');
                    if (finalScore) finalScore.innerText = airplaneTotalScore;
                    
                    const btn = document.getElementById('airplane-continue-btn');
                    if (btn) {
                        btn.onclick = () => {
                            renderMCQuiz();
                            checkPendingPokemon();
                        };
                    }
                } else {
                    renderMCQuiz(); 
                    checkPendingPokemon();
                }
            }
        }

        function renderWordScramble() {
            const targetArea = window.currentGameContentArea || gameArea;
            if (currentIndex >= shuffledData.length) {
                handleGameComplete(currentGameId);
                shuffledData = [...gameData[unitSelect.value].words].sort(() => 0.5 - Math.random());
                currentIndex = 0;
            }

            const item = shuffledData[currentIndex];
            currentRacingLevel = 1 + Math.floor(taxiTotalScore / 50);

            targetArea.innerHTML = `
                <div class="w-full max-w-lg animate-fadeIn">
                    <div class="flex justify-between items-center bg-rose-50 border-2 border-rose-200 p-4 rounded-2xl mb-6 shadow-sm">
                        <div class="flex flex-col text-left">

                            <p class="text-md font-bold text-rose-800">目前等級: <span class="text-red-600">Lv.${currentRacingLevel}</span></p>
                        </div>
                        <button id="btn-switch-taxi" class="px-5 py-3 bg-gradient-to-r from-rose-500 to-red-600 text-white font-bold text-md rounded-xl shadow-md hover:shadow-xl hover:scale-105 transition-all flex items-center">
                            <span class="mr-2">🚕</span> 開始計程車
                        </button>
                    </div>

                    <h2 class="text-2xl font-bold text-center mb-4 text-red-800 tracking-wide">單字重組</h2>
                    
                    <div class="text-center">
                        <p class="text-lg text-red-700/70 mb-4">${item.chinese}</p>
                        <div id="rearranged-word" class="min-h-16 border-2 border-dashed border-red-400 bg-white/50 rounded-xl p-4 flex flex-wrap justify-center gap-2 mb-6 cursor-text"></div>
                        <div class="flex flex-wrap justify-center gap-3">
                            <button id="hint-next-letter-btn" class="px-4 py-2 rounded-full bg-red-100 text-red-800 font-bold hover:bg-red-200 transition-colors shadow-sm">提示字母 (2)</button>
                            <button id="hint-pronounce-btn" class="px-4 py-2 rounded-full bg-red-100 text-red-800 font-bold hover:bg-red-200 transition-colors shadow-sm">聽發音</button>
                            <button id="hint-spell-out-btn" class="px-4 py-2 rounded-full bg-red-100 text-red-800 font-bold hover:bg-red-200 transition-colors shadow-sm">聽拼寫</button>
                        </div>
                    </div>
                </div>`;
            
            document.getElementById('btn-switch-taxi').onclick = () => {
                if (gameFuel <= 0) {
                    const btn = document.getElementById('btn-switch-taxi');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '❌ 油量不足請答題';
                    btn.classList.replace('from-rose-500', 'from-gray-500');
                    btn.classList.replace('to-red-600', 'to-gray-600');
                    setTimeout(() => {
                        btn.innerHTML = originalHTML;
                        btn.classList.replace('from-gray-500', 'from-rose-500');
                        btn.classList.replace('to-gray-600', 'to-red-600');
                    }, 1500);
                    return;
                }
                startCarRacingGame();
            };

            const rearrangedWord = document.getElementById('rearranged-word');
            const hintNextLetterBtn = document.getElementById('hint-next-letter-btn');
            const hintPronounceBtn = document.getElementById('hint-pronounce-btn');
            const hintSpellOutBtn = document.getElementById('hint-spell-out-btn');

            let hintsRemaining = 2;

            speakWord(item.word, 0.7);

            item.word.split('').sort(() => 0.5 - Math.random()).forEach((letter, index) => {
                const token = document.createElement('div');
                token.textContent = letter;
                token.className = 'word-token px-5 py-3 rounded-lg bg-red-600 text-white font-bold shadow-md border border-red-700/50 hover:bg-red-700 text-2xl cursor-grab active:cursor-grabbing';
                rearrangedWord.appendChild(token);
            });
            
            const checkAnswer = () => {
                if (rearrangedWord.dataset.solved === 'true') return;
                const currentAnswer = Array.from(rearrangedWord.children).map(t => t.textContent).join('');
                if (currentAnswer === item.word) {
                    rearrangedWord.dataset.solved = 'true';
                    showCorrectMessage();
                    speakWord(item.word);
                    if (window.scrambleSortable) {
                        window.scrambleSortable.option("disabled", true);
                    }
                    hintNextLetterBtn.disabled = true;
                    setTimeout(() => { 
                        currentIndex++; 
                        if (!window.isMinigameActive && currentGameId === 'btn-game2') {
                            renderWordScramble(); 
                        }
                    }, 1500);
                }
            };

            if (window.scrambleSortable) {
                window.scrambleSortable.destroy();
            }
            window.scrambleSortable = new Sortable(rearrangedWord, {
                animation: 150,
                ghostClass: 'opacity-0',
                onEnd: checkAnswer
            });
            
            hintPronounceBtn.onclick = () => speakWord(item.word);
            hintSpellOutBtn.onclick = () => {
                const letters = item.word.split('');
                letters.forEach((letter, index) => {
                    setTimeout(() => { speakWord(letter); }, index * 400);
                });
            };

            hintNextLetterBtn.onclick = () => {
                if (hintsRemaining <= 0) return;
                const currentNodes = Array.from(rearrangedWord.children);
                const currentAnswerString = currentNodes.map(div => div.textContent).join('');
                const correctWord = item.word;

                let firstWrongIdx = -1;
                for (let i = 0; i < correctWord.length; i++) {
                    if (currentAnswerString[i] !== correctWord[i]) {
                        firstWrongIdx = i;
                        break;
                    }
                }
                if (firstWrongIdx === -1) return;

                const correctChar = correctWord[firstWrongIdx];
                let targetIdx = -1;
                for (let i = firstWrongIdx + 1; i < currentNodes.length; i++) {
                    if (currentNodes[i].textContent === correctChar) {
                        targetIdx = i;
                        break;
                    }
                }

                if (targetIdx !== -1) {
                    const nodeA = currentNodes[firstWrongIdx];
                    const nodeB = currentNodes[targetIdx];
                    
                    const nextB = nodeB.nextSibling;
                    rearrangedWord.insertBefore(nodeB, nodeA);
                    if (nextB) rearrangedWord.insertBefore(nodeA, nextB);
                    else rearrangedWord.appendChild(nodeA);
                    
                    nodeB.classList.add('ring-4', 'ring-yellow-400');
                    setTimeout(() => nodeB.classList.remove('ring-4', 'ring-yellow-400'), 1000);
                }

                hintsRemaining--;
                hintNextLetterBtn.textContent = `提示字母 (${hintsRemaining})`;
                if (hintsRemaining <= 0) {
                    hintNextLetterBtn.disabled = true;
                    hintNextLetterBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
                checkAnswer();
            };
        }

                    window.pendingPokemon = null;
